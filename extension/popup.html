<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0d1117;
      color: #e6edf3;
    }
    .header {
      background: linear-gradient(135deg, #00D4BE 0%, #009688 100%);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header img { width: 28px; height: 28px; }
    .header h1 { font-size: 15px; font-weight: 700; color: #0d1117; }
    .header span { font-size: 11px; color: #0d1117aa; }
    
    .stats {
      padding: 16px;
      display: flex;
      gap: 12px;
    }
    .stat-card {
      flex: 1;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }
    .stat-number { font-size: 24px; font-weight: 700; color: #00D4BE; }
    .stat-label { font-size: 10px; color: #8b949e; text-transform: uppercase; margin-top: 2px; }
    
    .actions {
      padding: 0 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    button {
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.15s;
    }
    
    .btn-primary {
      background: #00D4BE;
      color: #0d1117;
    }
    .btn-primary:hover { background: #00e6ce; }
    .btn-primary.active {
      background: #ff6b6b;
      color: white;
    }
    
    .btn-secondary {
      background: #21262d;
      color: #e6edf3;
      border: 1px solid #30363d;
    }
    .btn-secondary:hover { background: #30363d; }
    .btn-secondary:disabled { opacity: 0.4; cursor: default; }
    
    .btn-danger {
      background: transparent;
      color: #f85149;
      border: 1px solid #f8514933;
      font-size: 12px;
    }
    .btn-danger:hover { background: #f8514922; }
    
    .captures-list {
      max-height: 200px;
      overflow-y: auto;
      padding: 0 16px;
      margin-bottom: 12px;
    }
    .capture-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid #21262d;
    }
    .capture-thumb {
      width: 36px;
      height: 36px;
      border-radius: 4px;
      object-fit: cover;
      background: #161b22;
    }
    .capture-info {
      flex: 1;
      min-width: 0;
    }
    .capture-title {
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .capture-url {
      font-size: 10px;
      color: #8b949e;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .capture-remove {
      background: none;
      border: none;
      color: #8b949e;
      cursor: pointer;
      padding: 4px;
      font-size: 14px;
    }
    .capture-remove:hover { color: #f85149; }
    
    .empty {
      text-align: center;
      padding: 24px 16px;
      color: #8b949e;
      font-size: 12px;
    }
    .empty-icon { font-size: 32px; margin-bottom: 8px; }
    
    .footer {
      padding: 12px 16px;
      border-top: 1px solid #21262d;
      text-align: center;
      font-size: 10px;
      color: #484f58;
    }
    .footer a { color: #00D4BE; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icon48.png" alt="SoupyLab">
    <div>
      <h1>SoupyLab Harvester</h1>
      <span>Privacy-first image capture</span>
    </div>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-number" id="captureCount">0</div>
      <div class="stat-label">Captured</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="siteCount">0</div>
      <div class="stat-label">Sources</div>
    </div>
  </div>

  <div class="actions">
    <button class="btn-primary" id="toggleHarvest">
      <span>⚡</span>
      <span id="harvestLabel">Enable Harvest Mode</span>
    </button>
    <button class="btn-secondary" id="exportBtn" disabled>
      <span>📦</span>
      Export as JSON
    </button>
  </div>

  <div id="capturesList" class="captures-list"></div>

  <div class="actions" style="padding-top: 0">
    <button class="btn-danger" id="clearBtn" style="display:none">
      🗑️ Clear All Captures
    </button>
  </div>

  <div class="footer">
    All data stored locally · <a href="https://soupylab.com" target="_blank">soupylab.com</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
